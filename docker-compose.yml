services:
  jimeng-pool:
    image: ghcr.io/carminback/jimeng-free-api-all:latest
    container_name: jimeng-pool
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - jimeng-pool-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8000/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  jimeng-pool-data:
